<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmador IND - Profesional</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: #2f3337; 
            overflow: hidden;
        }
        
        /* Panel Izquierdo: Configuración */
        .sidebar { 
            width: 320px; 
            background: #ffffff; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            z-index: 20;
        }
        
        /* Panel Central: Navegador de Páginas */
        .page-nav {
            width: 120px;
            background: #404448;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 10px;
            border-right: 1px solid #555;
        }

        .page-thumb {
            width: 80px;
            height: 110px;
            background: white;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #333;
            transition: 0.2s;
        }
        .page-thumb:hover { border-color: #007bff; }
        .page-thumb.active { border-color: #28a745; background: #e7f3ff; }

        /* Área Principal del Visor */
        .viewer-area { 
            flex-grow: 1; 
            overflow: auto; 
            padding: 40px; 
            display: flex; 
            justify-content: center;
            align-items: flex-start;
        }
        
        #canvas-container { 
            position: relative; 
            background: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            display: none;
        }
        
        #pdf-render { display: block; max-width: 100%; }
        
        #firma-flotante { 
            position: absolute; 
            cursor: move; 
            width: 180px; 
            display: none; 
            opacity: 0.6; /* Semitransparente al inicio */
            transition: opacity 0.3s, border 0.3s;
            z-index: 1000;
        }
        #firma-flotante.fixed {
            opacity: 1; /* Sólida al fijar */
            border: none !important;
        }

        /* Estilos de inputs y botones */
        h2 { font-size: 1.2rem; color: #d32f2f; margin: 0; }
        label { font-size: 0.8rem; font-weight: bold; color: #555; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-enviar { 
            background: #28a745; color: white; border: none; padding: 15px; 
            border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: auto;
        }
        .btn-enviar:hover { background: #218838; }
        #placeholder { color: #ccc; text-align: center; margin-top: 200px; width: 100%; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Firmar Informe</h2>
    <hr>
    <label>Nombre del Profesor:</label>
    <input type="text" id="nombreProfesor" placeholder="EJ: ALEXANDRA ARAYA">
    
    <label>1. Informe PDF:</label>
    <input type="file" id="pdfInput" accept="application/pdf">
    
    <label>2. Foto de Firma:</label>
    <input type="file" id="firmaInput" accept="image/*">
    
    <p style="font-size: 0.75rem; color: #666;">
        Tip: Usa el panel gris para cambiar de página. Doble clic en la firma para "estamparla".
    </p>
    
    <button id="btnFirmar" class="btn-enviar" style="display:none;">GENERAR Y ENVIAR</button>
</div>

<div class="page-nav" id="page-nav" style="display:none;">
    </div>

<div class="viewer-area">
    <div id="placeholder"><h3>Cargue un documento para visualizar</h3></div>
    <div id="canvas-container">
        <canvas id="pdf-render"></canvas>
        <img id="firma-flotante" src="" alt="Firma">
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
