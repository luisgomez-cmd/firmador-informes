<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Firmador IND Oficial</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: #333; overflow: hidden; }
        .sidebar { width: 300px; background: white; padding: 20px; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .main { flex-grow: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #525659; }
        
        #canvas-container { 
            position: relative; 
            background: white; 
            display: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            margin-top: 10px;
        }
        
        #pdf-render { display: block; }
        
        /* Contenedor de la firma para permitir redimensionar */
        #firma-wrapper {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 150px;
            display: none;
            z-index: 999;
            cursor: move;
            border: 2px dashed #007bff;
            opacity: 0.5; /* Semitransparente por defecto */
            transition: opacity 0.2s;
        }

        #firma-flotante {
            width: 100%;
            height: 100%;
            display: block;
            mix-blend-mode: multiply;
            pointer-events: none; /* Deja que el wrapper maneje los clics */
        }

        /* Estado confirmado */
        #firma-wrapper.confirmada {
            opacity: 1;
            border: 2px solid transparent;
        }

        /* Puntos para agrandar/achicar (solo visibles al confirmar) */
        .resizer {
            width: 10px;
            height: 10px;
            background: #007bff;
            position: absolute;
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
            display: none;
        }
        #firma-wrapper.confirmada .resizer { display: block; }

        .controls { background: white; padding: 10px 20px; margin-bottom: 10px; border-radius: 30px; display: none; gap: 15px; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 100%; margin: 5px 0; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-ok { background: #2e7d32; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: auto; }
        h2 { font-size: 1.2rem; color: #c62828; margin-top: 0; }
        .hint { font-size: 0.75rem; color: #666; margin-top: 5px; line-height: 1.3; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Firmar Informe</h2>
    <input type="text" id="nombreProfesor" placeholder="Tu Nombre y Apellido">
    <label style="font-size: 0.8rem; font-weight: bold; margin-top: 10px;">1. Cargar PDF:</label>
    <input type="file" id="pdfInput" accept=".pdf">
    <label style="font-size: 0.8rem; font-weight: bold; margin-top: 10px;">2. Cargar Firma:</label>
    <input type="file" id="firmaInput" accept="image/*">
    
    <div class="hint">
        • <b>Arrastra</b> para ubicar.<br>
        • <b>Doble clic</b> para confirmar (opacidad 100%).<br>
        • <b>Usa el punto azul</b> para cambiar tamaño.
    </div>

    <button id="btnGenerar" class="btn-ok" style="display:none;">GENERAR DOCUMENTO</button>
</div>

<div class="main">
    <div id="controls" class="controls">
        <button onclick="cambiarPagina(-1)" style="width: 50px;">◀</button>
        <span id="page-info" style="font-weight: bold; font-size: 0.9rem;">Página: 0 / 0</span>
        <button onclick="cambiarPagina(1)" style="width: 50px;">▶</button>
    </div>

    <div id="canvas-container">
        <canvas id="pdf-render"></canvas>
        <div id="firma-wrapper">
            <img id="firma-flotante" src="" alt="firma">
            <div class="resizer"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="script.js"></script>
</body>
</html>
