<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmador IND</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; /* Centra todo el contenido */
            height: 100vh; 
            background: #525659; /* Fondo gris oscuro tipo lector PDF */
        }
        
        /* Contenedor Principal Limitado */
        .app-container {
            display: flex;
            width: 100%;
            max-width: 1400px; /* Evita que se estire demasiado */
            background: #f8f9fa;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Lateral Izquierdo: Configuración */
        .sidebar { 
            width: 300px; 
            background: #ffffff; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            border-right: 1px solid #ddd;
        }
        
        /* Navegador de Miniaturas */
        .page-nav {
            width: 150px;
            background: #e9ecef;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 15px;
        }

        .page-thumb {
            width: 100px;
            height: 130px;
            background: white;
            cursor: pointer;
            border: 1px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .page-thumb canvas { width: 90%; height: auto; margin-top: 5px; }
        .page-thumb:hover { border-color: #007bff; }
        .page-thumb.active { border: 2px solid #28a745; background: #fff; }

        /* Área Principal del Visor */
        .viewer-area { 
            flex-grow: 1; 
            overflow: auto; 
            padding: 40px; 
            display: flex; 
            justify-content: center;
            background: #525659;
        }
        
        #canvas-container { 
            position: relative; 
            background: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.3); 
            display: none;
        }
        
        #pdf-render { display: block; }
        
        #firma-flotante { 
            position: absolute; 
            cursor: move; 
            width: 180px; 
            display: none; 
            mix-blend-mode: multiply; /* Truco para quitar el fondo blanco de las fotos */
            z-index: 1000;
            border: 1px dashed transparent;
        }
        
        #firma-flotante.moving {
            border: 1px dashed #007bff;
            opacity: 0.7;
        }

        h2 { font-size: 1.1rem; color: #d32f2f; margin: 0; }
        label { font-size: 0.8rem; font-weight: bold; color: #555; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; }
        
        .btn-enviar { 
            background: #28a745; color: white; border: none; padding: 15px; 
            border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: auto;
        }
        
        .instrucciones { font-size: 0.75rem; color: #666; background: #fff3cd; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2>Firmar Informe</h2>
        <div class="instrucciones">
            1. Sube PDF y Firma.<br>
            2. Arrastra la firma.<br>
            3. <b>Doble clic</b> para fijar.
        </div>
        
        <label>Nombre del Profesor:</label>
        <input type="text" id="nombreProfesor" placeholder="EJ: ALEXANDRA ARAYA">
        
        <label>1. Informe PDF:</label>
        <input type="file" id="pdfInput" accept="application/pdf">
        
        <label>2. Foto de Firma:</label>
        <input type="file" id="firmaInput" accept="image/*">
        
        <button id="btnFirmar" class="btn-enviar" style="display:none;">GENERAR INFORME FINAL</button>
    </div>

    <div class="page-nav" id="page-nav" style="display:none;">
        </div>

    <div class="viewer-area">
        <div id="canvas-container">
            <canvas id="pdf-render"></canvas>
            <img id="firma-flotante" src="" alt="Firma">
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
