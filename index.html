<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmador IND</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            background: #525659; 
        }
        
        .app-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            background: #f4f4f4;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .sidebar { 
            width: 280px; 
            background: #ffffff; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            border-right: 1px solid #ddd;
        }

        .viewer-area { 
            flex-grow: 1; 
            overflow: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            background: #8e9194;
        }
        
        #canvas-container { 
            position: relative; 
            background: white; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2); 
            display: none;
            margin-top: 10px;
        }
        
        #pdf-render { display: block; border: 1px solid #ccc; }
        
        /* Estilo de la Firma: Sin cuadro, mezcla con el fondo */
        #firma-flotante { 
            position: absolute; 
            cursor: move; 
            width: 150px; 
            display: none; 
            mix-blend-mode: multiply; /* Esto quita el fondo blanco de la foto */
            z-index: 100;
            top: 0;
            left: 0;
        }

        .controles-paginas {
            margin-bottom: 10px;
            display: none;
            gap: 10px;
            align-items: center;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
        }

        h2 { font-size: 1.1rem; color: #b71c1c; margin: 0; }
        label { font-size: 0.8rem; font-weight: bold; color: #333; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; width: 100%; }
        
        button { 
            padding: 10px; 
            border-radius: 5px; 
            border: 1px solid #ccc; 
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-enviar { 
            background: #2e7d32; color: white; border: none; padding: 15px; 
            font-weight: bold; margin-top: auto;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2>Firmar Informe</h2>
        <hr>
        <label>Nombre del Profesor:</label>
        <input type="text" id="nombreProfesor" placeholder="EJ: ALEXANDRA ARAYA">
        
        <label>1. Subir Informe (PDF):</label>
        <input type="file" id="pdfInput" accept="application/pdf">
        
        <label>2. Subir Firma (Imagen):</label>
        <input type="file" id="firmaInput" accept="image/*">
        
        <div style="font-size: 0.7rem; color: #666; margin-top: 10px;">
            <b>Instrucciones:</b><br>
            - Usa las flechas para ir a la última página.<br>
            - Arrastra la firma a su lugar.<br>
            - Haz doble clic para fijar.
        </div>
        
        <button id="btnFirmar" class="btn-enviar" style="display:none;">GENERAR DOCUMENTO</button>
    </div>

    <div class="viewer-area">
        <div id="controles" class="controles-paginas">
            <button id="prev-page">◀ Anterior</button>
            <span id="page-num-display">Página: 1 / 1</span>
            <button id="next-page">Siguiente ▶</button>
        </div>

        <div id="canvas-container">
            <canvas id="pdf-render"></canvas>
            <img id="firma-flotante" src="" alt="Firma">
        </div>
        
        <div id="mensaje-inicial" style="color: white; margin-top: 100px;">
            <h3>Cargue un informe para comenzar</h3>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="script.js"></script>
</body>
</html>
