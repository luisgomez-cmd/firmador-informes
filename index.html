<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Firmador IND Oficial</title>
    <style>
        body { font-family: Arial; margin: 0; display: flex; height: 100vh; background: #333; }
        .sidebar { width: 300px; background: white; padding: 20px; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .main { flex-grow: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        #canvas-container { 
            position: relative; 
            border: 1px solid white; 
            background: white; 
            display: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        #pdf-render { display: block; }
        
        /* Estilo idéntico a sistemas profesionales */
        #firma-flotante { 
            position: absolute; 
            cursor: move; 
            width: 150px; 
            display: none; 
            mix-blend-mode: multiply; /* Elimina fondo blanco de la firma */
            z-index: 999;
            top: 50px;
            left: 50px;
            user-select: none;
        }

        .controls { background: #eee; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: none; }
        input, button { width: 100%; margin: 5px 0; padding: 10px; }
        .btn-ok { background: #2e7d32; color: white; border: none; font-weight: bold; cursor: pointer; }
        h2 { font-size: 1.2rem; color: #c62828; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Firmar Informe</h2>
    <input type="text" id="nombreProfesor" placeholder="Tu Nombre y Apellido">
    <label>1. Cargar PDF:</label>
    <input type="file" id="pdfInput" accept=".pdf">
    <label>2. Cargar Firma:</label>
    <input type="file" id="firmaInput" accept="image/*">
    <button id="btnGenerar" class="btn-ok" style="display:none;">DESCARGAR FIRMADO</button>
</div>

<div class="main">
    <div id="controls" class="controls">
        <button onclick="cambiarPagina(-1)" style="width: 80px;">◀</button>
        <span id="page-info">Página: 0 / 0</span>
        <button onclick="cambiarPagina(1)" style="width: 80px;">▶</button>
    </div>

    <div id="canvas-container">
        <canvas id="pdf-render"></canvas>
        <img id="firma-flotante" src="" alt="firma">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="script.js"></script>
</body>
</html>
