<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Firmas SIGI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cem-hover: #78d64b;
            --dps-hover: #ff8f1d;
            --bg-canvas: #e5e7eb;
            --bg-app: #ffffff;
            --text-dark: #1e293b; /* Gris azulado profundo, no negro puro */
            --btn-hover: #334155;
            --btn-processing: #2563eb;
            --btn-success: #10b981;
        }

        * { box-sizing: border-box; user-select: none; font-family: 'Inter', sans-serif; }
        
        body { 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #cfd4da; overflow: hidden;
        }

        /* --- PANTALLA DE INICIO --- */
        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 2000;
        }

        .header-intro h1 { 
            font-weight: 800; font-size: 2.8rem; letter-spacing: -0.04em; 
            color: var(--text-dark); margin-bottom: 70px; text-align: center;
        }

        /* Alineación mejorada de logos */
        .selector-horizontal { 
            display: flex; 
            gap: 40px; 
            justify-content: center; 
            align-items: stretch; /* Asegura que ambos tengan el mismo alto */
        }

        .btn-area-card {
            width: 380px; height: 260px; background: #ffffff; border: 1px solid #e2e8f0;
            border-radius: 28px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center; padding: 45px;
        }

        .btn-area-card img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }

        #btn-cem-card:hover { border-color: var(--cem-hover); box-shadow: 0 20px 40px rgba(120, 214, 75, 0.12); transform: translateY(-8px); }
        #btn-dps-card:hover { border-color: var(--dps-hover); box-shadow: 0 20px 40px rgba(255, 143, 29, 0.12); transform: translateY(-8px); }

        /* --- APP CONTAINER --- */
        .app-wrapper {
            display: none; 
            width: 95%; max-width: 1200px; height: 85vh;
            background: var(--bg-app); border-radius: 35px;
            overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.2);
            position: relative;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 360px; background: #ffffff; padding: 40px 30px; 
            display: flex; flex-direction: column; border-right: 1px solid #f1f5f9;
        }

        .logo-area { height: 100px; margin-bottom: 30px; display: flex; justify-content: center; align-items: center; }
        .logo-area img { max-width: 100%; max-height: 100%; object-fit: contain; }

        label { font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 0.05em; }
        
        input[type="text"] {
            width: 100%; padding: 14px 18px; border: 1px solid #e2e8f0; border-radius: 14px;
            margin-bottom: 25px; font-size: 1.1rem; font-weight: 500; background: #f8fafc; outline: none; 
            color: var(--text-dark);
        }

        .upload-zone {
            display: block; padding: 16px; background: #ffffff; border-radius: 14px;
            font-size: 0.9rem; color: #334155; cursor: pointer; margin-bottom: 20px;
            text-align: center; border: 1px solid #e2e8f0; font-weight: 600; transition: 0.2s;
        }
        .upload-zone:hover { background: #f8fafc; border-color: #cbd5e1; }

        /* INSTRUCCIONES MÁS GRANDES Y VISIBLES */
        .guia-rapida { margin-top: 5px; padding: 25px; background: #f1f5f9; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 25px;}
        .guia-rapida span { display: block; font-size: 0.85rem; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 15px; }
        .guia-item { display: flex; align-items: flex-start; gap: 12px; font-size: 0.95rem; color: #1e293b; margin-bottom: 12px; line-height: 1.4; font-weight: 500; }
        .guia-num { background: #1e293b; color: #ffffff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }

        .btn-main-action {
            width: 100%; background: #1e293b; color: white; border: none; padding: 22px; 
            font-weight: 700; cursor: pointer; border-radius: 18px; font-size: 1rem; 
            transition: all 0.3s ease; letter-spacing: 0.02em; margin-top: auto;
        }
        .btn-main-action:hover:not(:disabled) { background: var(--btn-hover); transform: translateY(-2px); }
        .btn-main-action.processing { background: var(--btn-processing) !important; cursor: wait; }
        .btn-main-action.success { background: var(--btn-success) !important; cursor: default; }

        /* --- VISOR --- */
        .main-viewer { flex-grow: 1; background: var(--bg-canvas); display: flex; flex-direction: column; align-items: center; padding: 25px; overflow: hidden; }
        .viewer-nav { background: rgba(255, 255, 255, 0.95); padding: 10px 25px; border-radius: 18px; display: none; align-items: center; gap: 20px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .nav-btn { background: #f8fafc; border: 1px solid #e2e8f0; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        .pdf-scroll-area { width: 100%; height: 100%; overflow: auto; display: flex; justify-content: center; padding-bottom: 60px; scrollbar-width: none; }
        #canvas-container { background: white; position: relative; display: none; }
        #pdf-render { display: block; }

        #firma-wrapper { 
            position: absolute; border: 2px dashed #2563eb; opacity: 0.5; 
            cursor: move; display: none; z-index: 100; width: 150px; 
        }
        #firma-wrapper.confirmada { border: none; opacity: 1; }
        .resizer-dot { width: 14px; height: 14px; background: #2563eb; position: absolute; right: -7px; bottom: -7px; border-radius: 50%; border: 2px solid white; cursor: nwse-resize; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <div class="header-intro"><h1>Plataforma de Firmas SIGI</h1></div>
        <div class="selector-horizontal">
            <div class="btn-area-card" id="btn-cem-card" onclick="window.seleccionarArea('CEM')">
                <img src="logo_cem.png" alt="CEM">
            </div>
            <div class="btn-area-card" id="btn-dps-card" onclick="window.seleccionarArea('DPS')">
                <img src="logo_dps.png" alt="DPS">
            </div>
        </div>
    </div>

    <div class="app-wrapper" id="app-main">
        <div class="sidebar">
            <div class="logo-area"><img id="logo-sidebar" src="" alt="Logo"></div>
            <label>Nombre y Apellido</label>
            <input type="text" id="nombreProfesor" placeholder="Ej. Marcela Paz">
            
            <label>1. Informe SIGI</label>
            <input type="file" id="pdfInput" accept=".pdf" style="display:none">
            <div class="upload-zone" onclick="document.getElementById('pdfInput').click()">Seleccionar archivo PDF</div>
            
            <label>2. Firma Digital</label>
            <input type="file" id="firmaInput" accept="image/*" style="display:none">
            <div class="upload-zone" onclick="document.getElementById('firmaInput').click()">Seleccionar imagen</div>
            
            <div class="guia-rapida">
                <span>Instrucciones</span>
                <div class="guia-item"><div class="guia-num">1</div><div>Ubica la firma arrastrándola.</div></div>
                <div class="guia-item"><div class="guia-num">2</div><div>Doble clic para fijarla.</div></div>
                <div class="guia-item"><div class="guia-num">3</div><div>Usa el punto azul para ajustar dimensiones.</div></div>
            </div>
            
            <button id="btnEnviar" class="btn-main-action" style="display:none">ENVIAR INFORME FIRMADO</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#94a3b8; cursor:pointer; font-size:0.75rem; margin-top:15px; text-decoration:underline">Cambiar de área</button>
        </div>

        <div class="main-viewer">
            <div class="viewer-nav" id="viewer-nav">
                <button class="nav-btn" onclick="window.cambiarPagina(-1)">◀</button>
                <span id="page-info" style="font-size:0.95rem; font-weight:700; color:#1e293b">PÁGINA 1 / 1</span>
                <button class="nav-btn" onclick="window.cambiarPagina(1)">▶</button>
            </div>
            <div class="pdf-scroll-area">
                <div id="canvas-container">
                    <canvas id="pdf-render"></canvas>
                    <div id="firma-wrapper">
                        <img id="firma-img" src="" style="width:100%; height:100%; mix-blend-mode:multiply; pointer-events:none">
                        <div class="resizer-dot"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
