<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Firmador IND Oficial</title>
    <style>
        /* Bloqueo total de selección azul y resaltados */
        * { 
            user-select: none; 
            -webkit-user-drag: none; 
            -webkit-tap-highlight-color: transparent;
        } 
        
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: #333; overflow: hidden; }
        
        .sidebar { width: 300px; background: white; padding: 20px; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .main { flex-grow: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #525659; }
        
        #canvas-container { 
            position: relative; 
            background: white; 
            display: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            margin-top: 10px;
        }
        
        #pdf-render { display: block; pointer-events: none; }
        
        #firma-wrapper {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 150px;
            display: none;
            z-index: 999;
            cursor: grab;
            border: 1px dashed #007bff;
            opacity: 0.4;
            transition: opacity 0.2s;
            /* Evita que se ponga azul al mover */
            background: transparent;
            outline: none;
        }

        #firma-wrapper:active { cursor: grabbing; }

        #firma-flotante {
            width: 100%;
            height: 100%;
            display: block;
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        #firma-wrapper.confirmada {
            opacity: 1;
            border: 1px solid transparent;
        }

        .resizer {
            width: 12px;
            height: 12px;
            background: #007bff;
            position: absolute;
            right: -6px;
            bottom: -6px;
            cursor: nwse-resize;
            border-radius: 50%;
        }

        .controls { 
            background: white; 
            padding: 8px 20px; 
            margin-bottom: 10px; 
            border-radius: 30px; 
            display: none; 
            gap: 15px; 
            align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        /* Botones de navegación sin resaltado azul */
        .nav-btn {
            width: 50px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: #f9f9f9;
            cursor: pointer;
            outline: none;
        }
        .nav-btn:active { background: #ddd; }

        input { width: 100%; margin: 5px 0; padding: 10px; border-radius: 5px; border: 1px solid #ccc; outline: none; }
        .btn-ok { width: 100%; background: #2e7d32; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; margin-top: auto; border-radius: 5px; }
        h2 { font-size: 1.2rem; color: #c62828; margin-top: 0; }
        .hint { font-size: 0.75rem; color: #666; margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Firmador IND</h2>
    <input type="text" id="nombreProfesor" placeholder="Nombre y Apellido">
    
    <label style="font-size: 0.8rem; font-weight: bold; margin-top: 10px;">1. Informe (PDF):</label>
    <input type="file" id="pdfInput" accept=".pdf">
    
    <label style="font-size: 0.8rem; font-weight: bold; margin-top: 10px;">2. Firma (Imagen):</label>
    <input type="file" id="firmaInput" accept="image/*">
    
    <div class="hint">
        <b>Instrucciones:</b><br>
        1. Arrastra la firma.<br>
        2. <b>Doble clic</b> para fijarla.<br>
        3. Usa el punto azul para el tamaño.
    </div>

    <button id="btnGenerar" class="btn-ok" style="display:none;">GENERAR DOCUMENTO</button>
</div>

<div class="main">
    <div id="controls" class="controls">
        <button class="nav-btn" onclick="cambiarPagina(-1)">◀</button>
        <span id="page-info" style="font-weight: bold; font-size: 0.9rem;">Página: 0 / 0</span>
        <button class="nav-btn" onclick="cambiarPagina(1)">▶</button>
    </div>

    <div id="canvas-container">
        <canvas id="pdf-render"></canvas>
        <div id="firma-wrapper">
            <img id="firma-flotante" src="" alt="firma">
            <div class="resizer"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="script.js"></script>
</body>
</html>
