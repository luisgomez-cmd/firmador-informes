<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmador de Informes IND</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: #eef2f3; 
            overflow: hidden;
        }
        
        /* Panel Lateral */
        .sidebar { 
            width: 350px; 
            background: white; 
            padding: 25px; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            overflow-y: auto;
        }
        
        h2 { color: #d32f2f; margin-top: 0; font-size: 1.4rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 0.85rem; color: #444; margin-bottom: -5px; display: block; }
        
        input[type="text"], input[type="file"] { 
            width: 100%; 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #ccc; 
            background: #fafafa;
        }
        
        .instrucciones { 
            background: #e7f3ff; 
            color: #0c5460; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 0.85rem; 
            line-height: 1.4;
            border: 1px solid #bee5eb;
        }

        .btn-enviar { 
            background: #28a745; 
            color: white; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 8px;
            font-size: 1rem;
            transition: background 0.3s;
        }
        .btn-enviar:hover { background: #218838; }

        /* Área del Visor */
        .viewer-area { 
            flex-grow: 1; 
            overflow: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            background: #525659; /* Color tipo lector PDF */
        }
        
        #placeholder-text { 
            margin-top: 100px;
            text-align: center; 
            color: white; 
        }
        
        #canvas-container { 
            position: relative; 
            background: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: none; 
            margin-bottom: 50px;
        }
        
        #pdf-render { max-width: 100%; height: auto; }
        
        #firma-flotante { 
            position: absolute; 
            cursor: move; 
            width: 180px; 
            display: none; 
            border: 2px dashed #007bff; 
            background: rgba(255,255,255,0.3);
            top: 0;
            left: 0;
            z-index: 100;
        }

        .page-info {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Firmar Informe</h2>
    <div class="instrucciones">
        <strong>Pasos:</strong><br>
        1. Escribe tu nombre.<br>
        2. Sube el PDF e Imagen de firma.<br>
        3. Arrastra la firma a su posición.<br>
        4. Haz <b>doble clic</b> en la firma para fijarla.
    </div>
    
    <label>Nombre del Profesor:</label>
    <input type="text" id="nombreProfesor" placeholder="Ej: ALEXANDRA ARAYA">
    
    <label>1. Seleccionar Informe (PDF):</label>
    <input type="file" id="pdfInput" accept="application/pdf">
    
    <label>2. Subir Foto de Firma:</label>
    <input type="file" id="firmaInput" accept="image/*">
    
    <button id="btnFirmar" class="btn-enviar" style="display:none;">GENERAR INFORME FINAL</button>
</div>

<div class="viewer-area">
    <div id="page-label" class="page-info">Mostrando última página (pág. <span id="num-pag"></span>)</div>
    
    <div id="placeholder-text">
        <h3>Esperando documento...</h3>
        <p>Carga un informe en el panel de la izquierda para comenzar.</p>
    </div>
    
    <div id="canvas-container">
        <canvas id="pdf-render"></canvas>
        <img id="firma-flotante" src="" alt="Firma">
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
